<template>
    <lightning-card title="Speaker Search">
        <div class="slds-p-around_medium">

            <lightning-input
                label="Speaker Name"
                type="text"
                onchange={handleNameChange}>
            </lightning-input>

            <lightning-combobox
                label="Speciality"
                placeholder="Select Speciality"
                options={specialityOptions}
                onchange={handleSpecialityChange}>
            </lightning-combobox>

        </div>
    </lightning-card>

    <c-speaker-list 
        speakers={speakers} 
        onrowselect={handleSpeakerSelect}>
    </c-speaker-list>
</template>
