<template>
    <lightning-card title="Speaker Details & Availability">
        <template if:true={speaker}>
            <div class="slds-m-around_medium">
                <p><strong>Name:</strong> {speaker.Name}</p>
                <p><strong>Bio:</strong> {speaker.Bio__c}</p>
                <p><strong>Speciality:</strong> {speaker.Speciality__c}</p>
            </div>

            <div class="slds-m-around_medium">
                <lightning-input
                    type="date"
                    label="Select Date"
                    value={selectedDate}
                    onchange={handleDateChange}>
                </lightning-input>

                <lightning-button
                    label="Create Assignment"
                    variant="brand"
                    onclick={createAssignment}
                    disabled={isButtonDisabled}
                    class="slds-m-top_small">
                </lightning-button>
            </div>
        </template>

        <template if:false={speaker}>
            <p class="slds-m-around_medium">
                Select a speaker from the left panel.
            </p>
        </template>
    </lightning-card>
</template>
